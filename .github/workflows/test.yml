name: Android Test

on:
  pull_request:
    branches: [ "main" ]
    paths:
      - 'app/androidApp/**'
      - 'app/shared/**'
      - 'core/**'
      - '**/*.gradle.kts'
      - 'gradle/libs.versions.toml'
      - 'gradle/wrapper/**'
      - 'settings.gradle.kts'
      - '.github/workflows/test.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Run checks
        run: ./gradlew check --no-daemon
